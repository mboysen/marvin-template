# MARVIN Team Plugin Configuration
# Generated by /team init. Share this directory with your team.

team:
  name: ""  # Your team name

# ─── Shared Context ───
# Configure where your team's shared context lives.
# Uncomment and fill in the tools your team uses.

shared_context:

  # Communication: where digests are posted and team activity monitored
  # slack:
  #   digest_channel: "#team-marvin-updates"
  #   monitor_channels:
  #     - "#eng-general"
  #     - "#eng-blockers"

  # Knowledge base: where decisions and priorities live
  # Pick one (or more):

  # google:
  #   priorities_doc_id: ""
  #   decisions_doc_id: ""
  #   team_state_doc_id: ""    # Main shared context doc

  # confluence:
  #   space: ""
  #   decisions_page_id: ""
  #   priorities_page_id: ""

  # notion:
  #   priorities_page_id: ""
  #   decisions_database_id: ""

  # Work tracking: where tasks and projects are managed
  # Pick one:

  # jira:
  #   projects:
  #     - key: ""
  #       name: ""

  # linear:
  #   team_id: ""

  # github:
  #   repos:
  #     - "org/repo"

# ─── Behaviors ───
# What each MARVIN does with shared context.

behaviors:
  on_start:
    - read_team_priorities      # Read shared priorities doc/page
    - read_recent_digests       # Check teammate digests since last session
    - check_team_blockers       # Surface active blockers

  on_end:
    - post_digest               # Post session digest to team
    - update_decisions          # Update shared decisions if any made
    - update_blockers           # Update blockers if raised/resolved

  digest:
    format: "digest/format.md"  # Digest template
    post_to: ""                 # Where to post: "slack", "google", "confluence", "notion"
    require_approval: true      # Always confirm before posting (recommended)

# ─── Inngest Event Coordination (Optional, Level 2) ───
# Enable for push-based team awareness. Requires Inngest account.
# Without this, team mode uses pull-based awareness (read on /start).

# inngest:
#   enabled: false
#   app_id: ""
#   events:
#     on_digest_posted: "marvin/digest.posted"
#     on_blocker_raised: "marvin/blocker.raised"
#     on_blocker_resolved: "marvin/blocker.resolved"
#     on_decision_made: "marvin/decision.made"
#   runtime: "inngest-cloud"    # or "ccr", "vercel", "cloudflare"
